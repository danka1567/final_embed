name: Stream Extractor

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Embed URL to resolve"
        required: true
        default: "https://multiembed.mov/?video_id=931285&tmdb=1"
      all_servers:
        description: "All servers? (true/false)"
        required: false
        default: "true"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Run extractor
        run: |
          FLAG=""
          [ "${{ github.event.inputs.all_servers }}" = "false" ] && FLAG="--single"
          python multiembed.py "${{ github.event.inputs.url }}" $FLAG --debug 2>&1 | tee /tmp/raw.txt
          # last JSON block is the result
          python - << 'PY'
          import sys, json, re
          raw = open("/tmp/raw.txt").read()
          m = re.search(r'(\{.*\})\s*$', raw, re.S)
          if m:
              data = json.loads(m.group(1))
              print(json.dumps(data, indent=2))
              open("result.json","w").write(json.dumps(data, indent=2))
          PY

      - name: Show result
        run: cat result.json || echo "No result.json"

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-result
          path: result.json
          retention-days: 3
